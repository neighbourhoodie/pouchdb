name: PouchDB Docs

on:
  push:
    paths:
      - '.github/ISSUE_TEMPLATE/'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CONTRIBUTING.md'
      - 'DISCLAIMER'
      - 'LICENSE'
      - 'NOTICE'
      - 'README.md'
      - 'TESTING.md'
      - 'docs/**'

  pull_request:
    branches: [master]
    paths:
      - '.github/ISSUE_TEMPLATE/'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CONTRIBUTING.md'
      - 'DISCLAIMER'
      - 'LICENSE'
      - 'NOTICE'
      - 'README.md'
      - 'TESTING.md'
      - 'docs/**'

jobs:

  test-docs:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-node-package
        with:
          node-version: 24
      - run: BUILD=1 npm run build-site
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
      - name: Checkout pouchdb-www repo
        uses: actions/checkout@v4
        with:
          repository: neighbourhoodie/pouchdb-www
          ref: asf-site
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          path: checked-out-pouchdb-www
      - name: Sync build artifacts
        run: |
          rsync -av --delete docs/_site/ checked-out-pouchdb-www/
      - name: Commit and push if changed
        run: |
          cd checked-out-pouchdb-www
          git config user.name "CI"
          git config user.email "ci@users.noreply.github.com"

          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "Deploy site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push git@github.com:neighbourhoodie/pouchdb-www.git asf-site
          else
            echo "No changes to commit"
          fi